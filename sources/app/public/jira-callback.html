<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Connecting Jira…</title>
    </head>
    <body>
        <p>Completing Jira connection… you can close this window.</p>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var message = {
                    source: "jira-oauth",
                    code: params.get("code"),
                    state: params.get("state"),
                    error: params.get("error")
                };

                // Relay the OAuth result back to the app window that opened this popup.
                if (window.opener) {
                    window.opener.postMessage(message, window.location.origin);
                }

                window.close();
            })();
        </script>
    </body>
</html>
